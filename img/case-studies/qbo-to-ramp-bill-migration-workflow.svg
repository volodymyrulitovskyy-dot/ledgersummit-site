<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">QBO to Ramp bill migration workflow</title>
  <desc id="desc">Visio-style workflow diagram showing planning, execution, quality control, and final handover for a QBO to Ramp bill migration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0d2651" flood-opacity="0.09"/>
    </filter>
    <style>
      .title { font: 800 42px/1.1 Inter, Arial, sans-serif; fill: #10254A; }
      .subtitle { font: 600 19px/1.5 Inter, Arial, sans-serif; fill: #4A6288; }
      .stageTitle { font: 800 26px/1.2 Inter, Arial, sans-serif; fill: #112C59; }
      .boxTitle { font: 800 19px/1.25 Inter, Arial, sans-serif; fill: #17376E; }
      .body { font: 600 15px/1.55 Inter, Arial, sans-serif; fill: #425A7D; }
      .small { font: 700 14px/1.4 Inter, Arial, sans-serif; fill: #4B6385; }
      .node { font: 800 16px/1.2 Inter, Arial, sans-serif; fill: #16305E; text-anchor: middle; }
      .flow { stroke: #5C86E8; stroke-width: 5; stroke-linecap: round; }
      .grid { stroke: rgba(31,72,146,0.08); stroke-width: 1; }
      .icon { stroke: #24509B; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>
  <rect width="1600" height="900" rx="34" fill="url(#bg)"/>
  <g opacity="0.9">
    <path d="M0 130H1600M0 250H1600M0 370H1600M0 490H1600M0 610H1600M0 730H1600" class="grid"/>
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900" class="grid"/>
  </g>
  <text x="72" y="88" class="title">QBO ? Ramp AP Migration Workflow</text>
  <text x="72" y="126" class="subtitle">A tested toolchain first, then controlled automation: planning, execution, quality control, and final handover.</text>

  <g filter="url(#panelShadow)">
    <rect x="70" y="180" width="340" height="610" rx="28" fill="#FFFFFF" stroke="#DCE7F7"/>
    <rect x="90" y="204" width="124" height="44" rx="14" fill="#EAF3FF"/>
    <text x="112" y="233" class="stageTitle">Planning</text>
    <rect x="96" y="274" width="288" height="122" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="120" y="307" class="boxTitle">1. Source inventory and freeze rules</text>
    <text x="120" y="338" class="body">- Count every QBO bill in scope</text>
    <text x="120" y="362" class="body">- Flag open AP vs archive history</text>
    <text x="120" y="386" class="body">- Lock vendor naming and entity mapping</text>
    <rect x="96" y="420" width="288" height="122" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="120" y="453" class="boxTitle">2. Canonical bill package design</text>
    <text x="120" y="484" class="body">- Header, lines, due dates, PO links</text>
    <text x="120" y="508" class="body">- Attachable image manifest per bill</text>
    <text x="120" y="532" class="body">- Duplicate and retry-safe IDs</text>
    <rect x="96" y="566" width="288" height="184" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="120" y="599" class="boxTitle">Why this mattered</text>
    <text x="120" y="630" class="body">Ramp's default bill import is great for current payable flow, but this project needed image visibility, PO continuity, approval readiness, and same-week aging tie-out.</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="440" y="180" width="340" height="610" rx="28" fill="#FFFFFF" stroke="#DCE7F7"/>
    <rect x="460" y="204" width="132" height="44" rx="14" fill="#EAF3FF"/>
    <text x="482" y="233" class="stageTitle">Execution</text>
    <rect x="466" y="274" width="288" height="122" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="490" y="307" class="boxTitle">3. API extraction from QBO</text>
    <text x="490" y="338" class="body">- Bills and bill lines</text>
    <text x="490" y="362" class="body">- LinkedTxn purchase-order relationships</text>
    <text x="490" y="386" class="body">- Attachable metadata and file downloads</text>
    <rect x="466" y="420" width="288" height="146" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="490" y="453" class="boxTitle">4. Ramp-ready document build</text>
    <text x="490" y="484" class="body">- Rebuild bill headers and coding</text>
    <text x="490" y="508" class="body">- Copy invoice images to approver-ready files</text>
    <text x="490" y="532" class="body">- Preserve PO header and line detail</text>
    <text x="490" y="556" class="body">- Carry one source reference per bill</text>
    <rect x="466" y="590" width="288" height="160" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="490" y="623" class="boxTitle">5. Ramp creation and routing</text>
    <text x="490" y="654" class="body">- Bills created in controlled batches</text>
    <text x="490" y="678" class="body">- Images verified before approver release</text>
    <text x="490" y="702" class="body">- PO-backed bills prepared for matching</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="810" y="180" width="340" height="610" rx="28" fill="#FFFFFF" stroke="#DCE7F7"/>
    <rect x="830" y="204" width="166" height="44" rx="14" fill="#EAF3FF"/>
    <text x="852" y="233" class="stageTitle">Quality Control</text>
    <rect x="836" y="274" width="288" height="146" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="860" y="307" class="boxTitle">6. Reconciliation checks</text>
    <text x="860" y="338" class="body">- Vendor-by-vendor AP aging tie-out</text>
    <text x="860" y="362" class="body">- Invoice count and amount controls</text>
    <text x="860" y="386" class="body">- Due-date bucket comparison</text>
    <text x="860" y="410" class="body">- Duplicate invoice number sweeps</text>
    <rect x="836" y="444" width="288" height="122" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="860" y="477" class="boxTitle">7. Document fidelity checks</text>
    <text x="860" y="508" class="body">- Every invoice image copied</text>
    <text x="860" y="532" class="body">- Every PO-backed bill keeps PO detail</text>
    <text x="860" y="556" class="body">- Exceptions isolated, not buried</text>
    <rect x="836" y="590" width="288" height="160" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="860" y="623" class="boxTitle">8. Approval and 3-way-match readiness</text>
    <text x="860" y="654" class="body">- Approvers see the actual invoice image</text>
    <text x="860" y="678" class="body">- PO references are visible at review time</text>
    <text x="860" y="702" class="body">- Receiving and exception principles preserved</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="1180" y="180" width="340" height="610" rx="28" fill="#FFFFFF" stroke="#DCE7F7"/>
    <rect x="1200" y="204" width="180" height="44" rx="14" fill="#EAF3FF"/>
    <text x="1222" y="233" class="stageTitle">Final handover</text>
    <rect x="1206" y="274" width="288" height="146" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="1230" y="307" class="boxTitle">9. Day-6 sign-off package</text>
    <text x="1230" y="338" class="body">- Migration manifest and rerun notes</text>
    <text x="1230" y="362" class="body">- Aging tie-out signed by finance</text>
    <text x="1230" y="386" class="body">- Image completeness and PO exception log</text>
    <text x="1230" y="410" class="body">- Owner-level operating notes</text>
    <rect x="1206" y="444" width="288" height="122" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="1230" y="477" class="boxTitle">10. Business outcome</text>
    <text x="1230" y="508" class="body">AP did not lose context during cutover.</text>
    <text x="1230" y="532" class="body">Ramp became usable on day one, not after cleanup.</text>
    <rect x="1206" y="590" width="288" height="160" rx="22" fill="#F7FBFF" stroke="#DCE7F7"/>
    <text x="1230" y="623" class="boxTitle">Delivered state</text>
    <text x="1230" y="654" class="body">- 3,000+ bills in Ramp</text>
    <text x="1230" y="678" class="body">- Full image copy for approvers</text>
    <text x="1230" y="702" class="body">- AP aging reconciled to QBO</text>
  </g>

  <path d="M410 485H438M780 485H808M1150 485H1178" class="flow"/>
  <path d="M770 128H820" class="flow"/>
  <g transform="translate(720 110)"><circle cx="0" cy="0" r="7" fill="#5C86E8"/></g>
  <g transform="translate(880 110)"><circle cx="0" cy="0" r="7" fill="#5C86E8"/></g>
</svg>
